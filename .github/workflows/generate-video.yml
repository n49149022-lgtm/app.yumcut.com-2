name: YumCut - Создать видео

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Твой промпт (напиши идею для видео)'
        required: true
        default: 'расскажи интересный факт о космосе'

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_URL: 'http://localhost:3000'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create prompt file
        run: |
          echo "${{ github.event.inputs.prompt }}" > prompt.txt

      - name: Generate video
        run: |
          npm run generate -- --prompt-file prompt.txt

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: yumcut-video
          path: output/*.mp4
          retention-days: 7
